name: Release Branch PyPI Publish

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  publish-pypi:
    name: Publish to PyPI (release branch)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sentryvault
    permissions:
      contents: read
    concurrency:
      group: pypi-release-publish
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Configure Poetry for PyPI token auth
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          poetry config pypi-token.pypi "$PYPI_TOKEN"

      - name: Build and publish package to PyPI
        run: poetry publish --build --no-interaction

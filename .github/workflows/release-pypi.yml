name: Release Branch PyPI Publish

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  publish-pypi:
    name: Publish to PyPI (release branch)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sentryvault
    permissions:
      contents: write
    concurrency:
      group: pypi-release-publish
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Extract package version
        id: package_meta
        run: |
          VERSION=$(python - <<'PY'
import pathlib
import tomllib

data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
print(data["project"]["version"])
PY
)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build distribution
        run: poetry build

      - name: Configure Poetry for PyPI token auth
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          poetry config pypi-token.pypi "$PYPI_TOKEN"

      - name: Publish package to PyPI
        run: poetry publish 

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package_meta.outputs.tag }}
          name: ${{ steps.package_meta.outputs.tag }}
          draft: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*
